services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_DEBUG=1 # 2 is more verbose
    volumes:
      - ${Ollama_Folder}:/root/.ollama
    security_opt:
      - "label=type:nvidia_container_t"
    devices:
      - nvidia.com/gpu=all # If there are multiple GPUs and the wrong one runs, then disable one on the host.
    restart: always

  openwebui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: open-webui
    ports:
      - "${Openwebui_Port}:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - open-webui:/app/backend/data
    restart: always

volumes:
  open-webui: